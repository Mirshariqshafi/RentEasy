{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-8 mt-10">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Create an Account</h1>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            <style>input{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;}</style>
            {% if field.errors %}<p class="text-red-500 text-sm mt-1">{{ field.errors }}</p>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-semibold">Register</button>
    </form>
    <p class="text-center text-gray-500 mt-4 text-sm">Already have an account? <a href="{% url 'login' %}" class="text-blue-600">Login</a></p>
</div>
{% endblock %}
