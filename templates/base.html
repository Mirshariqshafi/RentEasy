<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RentEasy{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-red-600">RentEasy</a>
            <div class="flex gap-4 items-center">
                {% if user.is_authenticated %}
                    <a href="{% url 'post_property' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">+ Post Property</a>
                    <a href="{% url 'my_listings' %}" class="text-gray-600 hover:text-blue-600">My Listings</a>
                    <a href="{% url 'my_messages' %}" class="text-gray-600 hover:text-blue-600">My Messages</a>
                    <span class="text-gray-500">Hi, {{ user.username }}</span>
                    <a href="{% url 'logout' %}" class="text-red-500 hover:text-red-700">Logout</a>
                {% else %}
                    <a href="{% url 'login' %}" class="text-gray-600 hover:text-blue-600">Login</a>
                    <a href="{% url 'register' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Register</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Flash Messages -->
    <div class="max-w-6xl mx-auto px-4 mt-4">
        {% for message in messages %}
            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
                {{ message }}
            </div>
        {% endfor %}
    </div>

    <!-- Page Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
