{% extends 'base.html' %}
{% block title %}Edit {{ property.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Edit Property</h1>
        <a href="{% url 'my_listings' %}" class="text-gray-500 hover:text-gray-700 text-sm">← Back to My Listings</a>
    </div>

    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            <style>
                input, select, textarea {
                    width: 100%;
                    padding: 8px 12px;
                    border: 1px solid #d1d5db;
                    border-radius: 8px;
                    margin-top: 4px;
                }
            </style>
            {% if field.errors %}
                <p class="text-red-500 text-sm mt-1">{{ field.errors }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <div class="flex gap-3 mt-6">
            <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-semibold">
                Save Changes
            </button>
            <a href="{% url 'my_listings' %}" class="flex-1 text-center bg-gray-100 text-gray-700 py-3 rounded-lg hover:bg-gray-200 font-semibold">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
