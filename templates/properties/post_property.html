{% extends 'base.html' %}
{% block title %}Post a Property{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Post a New Property</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            <style>input,select,textarea{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;margin-top:4px;}</style>
            {% if field.errors %}<p class="text-red-500 text-sm mt-1">{{ field.errors }}</p>{% endif %}
        </div>
        {% endfor %}

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Upload Photos</label>
            <input type="file" name="image" multiple accept="image/*" class="w-full border border-gray-300 rounded-lg p-2">
            <p class="text-xs text-gray-400 mt-1">You can select multiple photos</p>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-semibold">Post Property</button>
    </form>
</div>
{% endblock %}
